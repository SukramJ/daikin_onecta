repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
        exclude: ^blueprints/
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: [tomli]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: ^(tests/snapshots/|tests/fixtures/|blueprints/|custom_components/daikin_onecta/translations/)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        files: ^custom_components/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        files: ^custom_components/daikin_onecta/
        additional_dependencies:
          - homeassistant>=2024.12.0b
          - pyjwt
          - aiohttp
        args: [--config-file=pyproject.toml, --python-version=3.14]

  - repo: https://github.com/pylint-dev/pylint
    rev: v4.0.5
    hooks:
      - id: pylint
        files: ^custom_components/daikin_onecta/.*\.py$
        args: [--rcfile=pyproject.toml]
        additional_dependencies:
          - homeassistant>=2024.12.0b
          - pyjwt
          - aiohttp

  - repo: local
    hooks:
      - id: check-i18n
        name: check translations have all referenced keys
        language: python
        entry: python scripts/check_i18n.py
        files: ^custom_components/daikin_onecta/(translations/|.*\.py)$
        pass_filenames: false
      - id: lint-all-exports
        name: ensure __all__ is sorted in public modules
        language: python
        entry: python scripts/lint_exports.py
        files: ^custom_components/daikin_onecta/.*\.py$
        pass_filenames: true
