name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v4.5.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate manifest version matches tag
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: extract
        name: Extract tag and manifest version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/daikin_onecta/manifest.json'))['version'])")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: validate
    name: Create GitHub Release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Package integration
        run: |
          mkdir -p dist
          cd custom_components/daikin_onecta
          zip -r "../../dist/daikin_onecta-${{ needs.validate.outputs.version }}.zip" .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.validate.outputs.version }}"
          generate_release_notes: true
          files: dist/*.zip
